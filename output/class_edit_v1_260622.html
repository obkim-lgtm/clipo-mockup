<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="clipo_favicon.png">
  <title>수업 수정 (CLIPO)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *{font-family:'Pretendard GOV',-apple-system,sans-serif;box-sizing:border-box;margin:0;padding:0}
    body{background:#eef0f3;color:#222631;font-size:16px;min-height:100vh}
    button{font-family:inherit}

    /* 배경(흐릿한 수업 홈 느낌) */
    .backdrop{position:fixed;inset:0;background:rgba(34,38,49,0.4);display:flex;align-items:center;justify-content:center;z-index:10}

    /* ── 모달 ── */
    .modal-box{background:#fff;border-radius:20px;width:540px;max-width:calc(100vw - 48px);box-shadow:0 0 1px #2226314D,0 8px 24px rgba(0,0,0,.18);display:flex;flex-direction:column}
    .modal-head{padding:24px 24px 6px;display:flex;align-items:flex-start;justify-content:space-between}
    .modal-title{font-size:20px;font-weight:700;color:#222631}
    .modal-close{width:36px;height:36px;background:none;border:none;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#3b3f4c}
    .modal-close:hover{background:#f1f3f5}
    .modal-desc{padding:0 24px 4px;font-size:15px;color:#6d7381;line-height:1.55}
    .modal-body{padding:16px 24px 24px;display:flex;flex-direction:column;gap:18px}

    .row{display:grid;gap:8px}
    .row.cols-2{grid-template-columns:1fr 1fr}
    .field{display:flex;flex-direction:column;gap:6px}
    .field-label{font-size:14px;font-weight:500;color:#222631}
    .field-label.req::after{content:' *';color:#f2525f}
    .select,.input{height:44px;border:1px solid #dde1e8;border-radius:8px;padding:0 12px;font-size:16px;font-weight:500;color:#222631;background:#fff;font-family:inherit;width:100%}
    .select{appearance:none;-webkit-appearance:none;cursor:pointer;padding-right:36px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%236d7381' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 12px center}
    .select:focus,.input:focus{outline:none;border-color:#416bff}
    .input::placeholder{color:#b3b6bd}

    /* 잠금(수정 불가) 필드 */
    .select:disabled,.input:disabled{background-color:#f4f5f7;color:#9aa0ad;cursor:not-allowed;border-color:#e6e8ec}
    .select:disabled{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%23b8bcc4' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 12px center}
    .field.locked .field-label{color:#9aa0ad}

    .radio-group{display:flex;gap:24px;align-items:center;padding-top:4px}
    .radio{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:15px;font-weight:500;color:#222631}
    .radio input{display:none}
    .ring{width:20px;height:20px;border-radius:50%;border:1.5px solid #dde1e8;background:#fff;flex-shrink:0;transition:.15s}
    .radio input:checked + .ring{border:6.5px solid #365eef}
    /* 잠금 라디오: 선택값은 보이되 클릭 불가 + 톤 다운 */
    .radio.locked{cursor:not-allowed;color:#9aa0ad;pointer-events:none}
    .radio.locked input:checked + .ring{border:6.5px solid #c4c8d0}

    .helper{display:flex;gap:4px;font-size:14px;color:#222631;font-weight:500;align-items:center}
    .helper a{color:#365eef;text-decoration:none;cursor:pointer}

    /* 수정 잠금 안내 (전체폭) */
    .edit-lock{display:flex;align-items:flex-start;gap:8px;background:#f4f8ff;border:1px solid #d6e4ff;border-radius:10px;padding:13px 15px;font-size:14px;color:#3151c4;line-height:1.6}
    .edit-lock i{width:16px;height:16px;flex-shrink:0;margin-top:2px;color:#416bff}
    .edit-lock b{font-weight:700}

    .modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:4px 24px 20px}
    .btn-outline{height:44px;background:#fff;border:1px solid #cdd1d8;border-radius:8px;padding:0 20px;font-size:15px;font-weight:600;color:#3b3f4c;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;line-height:1}
    .btn-outline:hover{background:#f6f7f9}
    .btn-solid{height:44px;background:#365eef;border:none;border-radius:8px;padding:0 22px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;line-height:1}
    .btn-solid:hover{background:#3151c4}

    /* Toast */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);opacity:0;min-width:300px;max-width:520px;padding:14px 20px 14px 16px;border-radius:4px;display:flex;align-items:center;gap:12px;font-size:15px;font-weight:600;box-shadow:0 0 1px #2226314D,0 4px 12px #00000026;z-index:9999;transition:opacity .2s,transform .2s;pointer-events:none;background:#319d64;color:#fff}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.info{background:#416bff}

    /* 데모 토글 (드래그) */
    .demo-tgl{position:fixed;right:24px;bottom:24px;z-index:5000;background:#222631;border-radius:12px;padding:10px 12px;box-shadow:0 8px 24px #00000033;cursor:move;user-select:none}
    .demo-tgl .dt-h{font-size:11px;font-weight:700;color:#9aa0ad;letter-spacing:.04em;margin-bottom:7px;display:flex;align-items:center;gap:6px}
    .demo-tgl .dt-row{display:flex;gap:6px}
    .demo-tgl button{border:none;border-radius:7px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;background:#3a3f4c;color:#c5c9d2}
    .demo-tgl button.on{background:#416bff;color:#fff}
  </style>
</head>
<body>

<div class="backdrop">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title">수업 수정</div>
      <button class="modal-close" onclick="closeEdit()"><i data-lucide="x" style="width:18px;height:18px"></i></button>
    </div>
    <p class="modal-desc" id="modal-desc"></p>

    <div class="modal-body">
      <!-- 학기 / 학년 -->
      <div class="row cols-2">
        <div class="field">
          <label class="field-label">학기</label>
          <select class="select">
            <option>2026학년도 1학기</option>
            <option>2026학년도 2학기</option>
          </select>
        </div>
        <div class="field" id="field-grade">
          <label class="field-label">학년</label>
          <select class="select" id="selGrade">
            <option value="1" selected>1학년</option>
            <option value="2">2학년</option>
            <option value="3">3학년</option>
            <option value="4">4학년</option>
            <option value="5">5학년</option>
            <option value="6">6학년</option>
            <option value="none">학년 구분 없음</option>
          </select>
        </div>
      </div>

      <!-- 수정 잠금 안내 (등록 학생 있을 때) -->
      <div class="edit-lock" id="edit-lock" style="display:none">
        <i data-lucide="lock"></i>
        <span>이 수업은 이미 학생이 등록되어 있어 <b>학년 · 반 편성</b>은 바꿀 수 없어요. 바꾸려면 참여 학생을 모두 삭제하거나, 수업을 삭제하고 새로 만들어 주세요.</span>
      </div>

      <!-- 과목명 (수정 불가) -->
      <div class="field locked">
        <label class="field-label">과목명</label>
        <div class="radio-group">
          <label class="radio locked"><input type="radio" name="curri" checked><span class="ring"></span><span>2015 개정 교육과정</span></label>
          <label class="radio locked"><input type="radio" name="curri"><span class="ring"></span><span>2022 개정 교육과정</span></label>
        </div>
        <select class="select" disabled style="margin-top:6px"><option>사회</option></select>
      </div>

      <!-- 수업명 (수정 가능) -->
      <div class="field">
        <label class="field-label">수업명</label>
        <input class="input" value="경북교육청 설명">
      </div>

      <!-- 반 편성 (등록 학생 없으면 수정 가능) -->
      <div class="field" id="field-ban">
        <label class="field-label">반 편성</label>
        <div class="radio-group">
          <label class="radio ban-radio"><input type="radio" name="ban" checked><span class="ring"></span><span>학적 기준반</span></label>
          <label class="radio ban-radio"><input type="radio" name="ban"><span class="ring"></span><span>이동수업반</span></label>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-outline" onclick="closeEdit()">취소</button>
      <button class="btn-solid" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<!-- 데모 토글 -->
<div class="demo-tgl" id="demo-tgl">
  <div class="dt-h"><i data-lucide="flask-conical" style="width:13px;height:13px"></i> 데모 · 등록 학생</div>
  <div class="dt-row">
    <button id="s-none" class="on" onclick="setStu('none')">등록 학생 없음</button>
    <button id="s-has" onclick="setStu('has')">등록 학생 있음</button>
  </div>
</div>

<script>
var _toastTimer=null;
function toastMsg(msg, info){
  var t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.toggle('info', !!info);
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

// 닫기/취소 → 왔던 화면(수업 홈 또는 홈)으로
function closeEdit(){
  if(history.length>1){ history.back(); }
  else { location.href='co_teacher_review_v1_260611.html'; }
}
function saveEdit(){
  toastMsg('수업 정보를 저장했어요.');
  setTimeout(closeEdit, 1100);
}

// 등록 학생 유무에 따라 학년 수정 가능 여부 토글
function setStu(s){
  document.getElementById('s-none').classList.toggle('on', s==='none');
  document.getElementById('s-has').classList.toggle('on', s==='has');

  var grade=document.getElementById('selGrade');
  var fieldGrade=document.getElementById('field-grade');
  var fieldBan=document.getElementById('field-ban');
  var banRadios=document.querySelectorAll('.ban-radio');
  var lock=document.getElementById('edit-lock');
  var desc=document.getElementById('modal-desc');
  var locked=(s==='has');

  grade.disabled=locked;
  fieldGrade.classList.toggle('locked', locked);
  fieldBan.classList.toggle('locked', locked);
  banRadios.forEach(function(r){ r.classList.toggle('locked', locked); });
  lock.style.display = locked ? 'flex' : 'none';
  desc.textContent = locked
    ? '이미 만들어진 수업은 학기 · 수업명을 수정할 수 있어요.'
    : '이미 만들어진 수업은 학기 · 수업명 · 학년 · 반 편성을 수정할 수 있어요.';
  lucide.createIcons();
}

// 데모 토글 드래그
(function(){
  var el=document.getElementById('demo-tgl'); var drag=false, ox=0, oy=0;
  el.addEventListener('mousedown', function(e){ if(e.target.tagName==='BUTTON') return; drag=true; ox=e.clientX-el.offsetLeft; oy=e.clientY-el.offsetTop; el.style.right='auto'; el.style.bottom='auto'; });
  document.addEventListener('mousemove', function(e){ if(!drag) return; el.style.left=(e.clientX-ox)+'px'; el.style.top=(e.clientY-oy)+'px'; });
  document.addEventListener('mouseup', function(){ drag=false; });
})();

lucide.createIcons();
setStu('none');
</script>
</body>
</html>
