<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 채점 재실행 — CLIPO</title>
<link rel="icon" type="image/png" href="clipo_favicon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard GOV',-apple-system,sans-serif;color:#222631;background:rgba(0,0,0,0.45);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

  .modal{background:#fff;border-radius:12px;width:512px;max-width:calc(100vw - 48px);box-shadow:0 20px 60px rgba(0,0,0,0.25);max-height:calc(100vh - 48px);display:flex;flex-direction:column}
  .modal-hd{position:relative;padding:24px 24px 16px 24px}
  .modal-title{font-size:18px;font-weight:600;color:#222631;line-height:1.25}
  .modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border:0;background:transparent;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;line-height:1;color:#6d7381}
  .modal-close:hover{background:#f1f3f5}

  .modal-body{padding:0 24px 8px 24px;display:flex;flex-direction:column;gap:20px;overflow:auto}

  .field{display:flex;flex-direction:column;gap:12px}
  .field-label{display:inline-flex;align-items:center;gap:6px;font-size:16px;font-weight:600;color:#222631;line-height:1.25}
  .field-sub{font-size:14px;font-weight:400;color:#6d7381;line-height:1.5;margin-top:-4px}
  .help-icon{width:18px;height:18px;color:#6d7381;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
  .help-icon:hover{color:#416bff}

  /* Slider */
  .slider-wrap{padding:0 24px;display:flex;flex-direction:column}
  .slider-bar{position:relative;height:10px;border-radius:9999px;background:#dde1e8;box-shadow:inset 0 0 0 1px rgba(9,9,11,0.05)}
  .slider-fill{position:absolute;left:0;top:0;bottom:0;width:50%;background:#365eef;border-radius:9999px}
  .slider-thumb{position:absolute;top:50%;left:50%;width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid #365eef;transform:translate(-50%,-50%);box-shadow:0 1px 4px rgba(0,0,0,0.15)}
  .slider-marks{display:flex;justify-content:space-between;align-items:flex-start;margin-top:8px}
  .slider-mark{font-size:14px;font-weight:500;color:#6d7381;white-space:nowrap;line-height:1.25}

  /* Radio list */
  .radio-list{display:flex;flex-direction:column;gap:12px;padding-top:2px}
  .radio-row{display:flex;align-items:center;gap:10px;cursor:pointer}
  .radio-row .ring{width:20px;height:20px;border-radius:50%;background:#fff;border:1.5px solid #c7cbd3;flex-shrink:0}
  .radio-row.selected .ring{border:6.5px solid #365eef}
  .radio-row .lbl{font-size:16px;font-weight:500;color:#222631;line-height:1.25}
  .radio-row.fb-auto{width:100%}
  .fb-select{flex:1;min-width:0;height:40px;padding:0 12px;border:1px solid #dde1e8;border-radius:6px;font-family:inherit;font-size:15px;color:#222631;background:#fff;cursor:pointer}
  .fb-select:disabled{background:#f6f7f9;color:#9ea3ad;cursor:not-allowed}

  /* Footer */
  .modal-ft{padding:8px 24px 16px 24px;display:flex;justify-content:flex-end}
  .btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:40px;padding:10px 16px;border-radius:4px;font-family:inherit;font-size:15px;font-weight:500;line-height:1;cursor:pointer;border:0;background:#365eef;color:#fff}
  .btn-primary:hover{background:#2c4ed8}
</style>
</head>
<body>

<div class="modal">
  <div class="modal-hd">
    <div class="modal-title">AI 채점 재실행</div>
    <button class="modal-close" title="닫기"><i data-lucide="x" style="width:18px;height:18px"></i></button>
  </div>

  <div class="modal-body">

    <!-- 점수 수준 (재실행: 이 학생의 직전 채점 결과 대비) -->
    <div class="field">
      <span class="field-label">점수 수준</span>
      <div class="field-sub">이 학생의 직전 채점 결과와 비교해 점수를 조절해요. 점수에 맞춰 피드백도 함께 조절돼요.</div>
      <div class="slider-wrap">
        <div class="slider-bar">
          <div class="slider-fill"></div>
          <div class="slider-thumb"></div>
        </div>
        <div class="slider-marks">
          <span class="slider-mark">직전보다 높게</span>
          <span class="slider-mark">직전과 비슷</span>
          <span class="slider-mark">직전보다 낮게</span>
        </div>
      </div>
    </div>

    <!-- 학생 피드백 구성 -->
    <div class="field">
      <span class="field-label">
        학생 피드백 구성
        <span class="help-icon"><i data-lucide="circle-help" style="width:18px;height:18px"></i></span>
      </span>
      <div class="radio-list">
        <div class="radio-row" onclick="selectFb(this)">
          <div class="ring"></div>
          <div class="lbl">선생님이 직접 작성</div>
        </div>
        <div class="radio-row fb-auto selected" onclick="selectFb(this)">
          <div class="ring"></div>
          <div class="lbl" style="flex-shrink:0">자동 구성</div>
          <select class="fb-select" onclick="event.stopPropagation()">
            <option>채점 근거 기반 자동 구성</option>
            <option>AI 피드백 기반 자동 구성</option>
            <option selected>채점 근거 + 피드백 기반 자동 구성</option>
          </select>
        </div>
      </div>
    </div>

  </div>

  <div class="modal-ft">
    <button class="btn-primary">
      <i data-lucide="wand-sparkles" style="width:20px;height:20px"></i>
      AI 채점 재실행
    </button>
  </div>
</div>

<script>
  function selectFb(el){
    var list = el.closest('.radio-list');
    list.querySelectorAll('.radio-row').forEach(function(r){ r.classList.remove('selected'); });
    el.classList.add('selected');
    var autoRow = list.querySelector('.fb-auto');
    var sel = autoRow.querySelector('.fb-select');
    sel.disabled = !autoRow.classList.contains('selected');
  }
  if(window.lucide) lucide.createIcons();
</script>

</body>
</html>
