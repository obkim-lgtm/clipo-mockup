<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>클리포 체험 시작하기 모달 — CLIPO</title>
<link rel="icon" type="image/png" href="clipo_favicon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard GOV',-apple-system,sans-serif;color:#222631;background:rgba(0,0,0,0.45);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

  /* Modal */
  .modal{background:#fff;border-radius:16px;width:480px;max-width:calc(100vw - 48px);box-shadow:0 20px 60px rgba(0,0,0,0.25);padding:32px;position:relative}
  .modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border:0;background:transparent;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;line-height:1;color:#6d7381}
  .modal-close:hover{background:#f1f3f5}

  /* Header */
  .hd{text-align:center;margin-bottom:24px}
  .hd-icon{width:60px;height:60px;border-radius:50%;background:#e9f2ff;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;color:#416bff}
  .hd-title{font-size:22px;font-weight:700;color:#222631;line-height:1.3;margin-bottom:8px}
  .hd-sub{font-size:14px;font-weight:400;color:#6d7381;line-height:1.55}

  /* Card list */
  .cards{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}

  /* Card base */
  .card{display:flex;gap:14px;padding:16px;border-radius:10px;border:1px solid #dde1e8;background:#fff;cursor:pointer;transition:all .15s ease;align-items:flex-start}
  .card:hover{border-color:#416bff;box-shadow:0 4px 14px rgba(65,107,255,0.1)}

  /* Card icon */
  .card-icon{flex-shrink:0;width:40px;height:40px;border-radius:8px;background:#f4f6fa;display:inline-flex;align-items:center;justify-content:center;color:#416bff}

  /* Card content */
  .card-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
  .card-title{font-size:16px;font-weight:600;color:#222631;line-height:1.3}
  .card-desc{font-size:14px;font-weight:400;color:#6d7381;line-height:1.5}

  /* Badges row */
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
  .badge{display:inline-flex;align-items:center;gap:4px;height:24px;padding:0 8px;border-radius:4px;font-size:13px;font-weight:500;line-height:1}
  .badge-time{background:#f1f3f5;color:#6d7381}
  .badge-credit{background:#fff4de;color:#b45309}
  .badge-done{background:#dff8eb;color:#27724b}

  /* State: completed */
  .card.done{background:#f6f7f9;cursor:default}
  .card.done:hover{border-color:#dde1e8;box-shadow:none}
  .card.done .card-title{color:#6d7381}
  .card.done .card-icon{background:#edeff2;color:#9ea3ad}

  /* State: recommended */
  .card.recommended{border:2px solid #416bff;background:#f8fafe;padding:15px}
  .card.recommended .recommend-tag{display:inline-flex;align-items:center;height:20px;padding:0 6px;border-radius:3px;background:#416bff;color:#fff;font-size:11px;font-weight:600;line-height:1;margin-left:6px;vertical-align:middle;letter-spacing:0.2px}

  /* Footer */
  .ft{text-align:center}
  .ft-btn{background:transparent;border:0;color:#416bff;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;padding:8px 16px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
  .ft-btn:hover{text-decoration:underline}

  /* Chevron arrow on hover for active cards */
  .card-arrow{flex-shrink:0;display:flex;align-items:center;color:#c7cbd3;transition:transform .15s ease, color .15s ease}
  .card:hover .card-arrow{color:#416bff;transform:translateX(2px)}
  .card.done .card-arrow{display:none}
</style>
</head>
<body>

<div class="modal">
  <button class="modal-close" title="닫기"><i data-lucide="x" style="width:18px;height:18px"></i></button>

  <!-- Header -->
  <div class="hd">
    <div class="hd-icon">
      <i data-lucide="rocket" style="width:28px;height:28px"></i>
    </div>
    <div class="hd-title">클리포 체험 시작하기</div>
    <div class="hd-sub">주요 메뉴를 직접 체험해 보세요. 완료하면 AI 크레딧을 보상으로 드려요.</div>
  </div>

  <!-- Cards -->
  <div class="cards">

    <!-- Card 1: Completed -->
    <div class="card done">
      <div class="card-icon">
        <i data-lucide="monitor" style="width:20px;height:20px"></i>
      </div>
      <div class="card-body">
        <div class="card-title">클리포 메뉴 구성</div>
        <div class="card-desc">어떤 기능이 있는지 간단히 살펴보세요.</div>
        <div class="badges">
          <span class="badge badge-done"><i data-lucide="check" style="width:12px;height:12px"></i>완료 · +10 크레딧 받음</span>
        </div>
      </div>
    </div>

    <!-- Card 2: Recommended (next step) -->
    <div class="card recommended">
      <div class="card-icon">
        <i data-lucide="book-open" style="width:20px;height:20px"></i>
      </div>
      <div class="card-body">
        <div class="card-title">
          내 수업 활용 방법
          <span class="recommend-tag">다음 추천</span>
        </div>
        <div class="card-desc">설계·채점·세특까지 이어지는 흐름을 익혀 보세요.</div>
        <div class="badges">
          <span class="badge badge-time"><i data-lucide="clock" style="width:12px;height:12px"></i>3분 이내</span>
          <span class="badge badge-credit"><i data-lucide="gift" style="width:12px;height:12px"></i>+20 크레딧</span>
        </div>
      </div>
      <div class="card-arrow"><i data-lucide="chevron-right" style="width:20px;height:20px"></i></div>
    </div>

    <!-- Card 3: Default -->
    <div class="card">
      <div class="card-icon">
        <i data-lucide="sparkles" style="width:20px;height:20px"></i>
      </div>
      <div class="card-body">
        <div class="card-title">AI 채점 예시 보기</div>
        <div class="card-desc">AI가 채점한 실제 과제물을 확인해 보세요.</div>
        <div class="badges">
          <span class="badge badge-time"><i data-lucide="clock" style="width:12px;height:12px"></i>2~3분 이내</span>
          <span class="badge badge-credit"><i data-lucide="gift" style="width:12px;height:12px"></i>+10 크레딧</span>
        </div>
      </div>
      <div class="card-arrow"><i data-lucide="chevron-right" style="width:20px;height:20px"></i></div>
    </div>

  </div>

  <!-- Footer -->
  <div class="ft">
    <button class="ft-btn">나중에</button>
  </div>
</div>

<script>
  if(window.lucide) lucide.createIcons();
</script>

</body>
</html>
