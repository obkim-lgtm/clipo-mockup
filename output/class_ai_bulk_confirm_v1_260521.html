<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 점수 일괄 확정 | CLIPO</title>
<link rel="icon" type="image/svg+xml" href="clipo_favicon_elem.svg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*{font-family:'Pretendard GOV',-apple-system,sans-serif;box-sizing:border-box;margin:0;padding:0}
body{background:#f6f7f9;color:#222631;min-height:100vh}

/* ══════ 글로벌 헤더 (56px) ══════ */
.global-header{height:56px;background:#fff;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:210;padding:0 20px 0 8px;border-bottom:1px solid #f1f3f5}
.gh-left{display:flex;align-items:center;gap:8px}
.gh-menu-btn{width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;color:#3b3f4c;border-radius:4px}
.gh-menu-btn:hover{background:#f6f7f9}
.gh-product-tag{display:inline-flex;align-items:center;height:18px;margin-left:12px;padding-left:12px;border-left:1px solid #e5e7eb;color:#6d7381;font-size:14px;font-weight:600;line-height:1}
.gh-right{display:flex;align-items:center;gap:12px;padding-right:12px}
.gh-plan{display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:100px;background:#e9f2ff;border:1px solid #ccdfff;font-size:12px;font-weight:500;color:#3151c4;line-height:1}
.gh-dday{font-size:14px;font-weight:500;color:#6d7381;line-height:1}
.gh-credit{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:#3b3f4c;line-height:1}
.gh-sep{width:0;height:14px;border-left:1px solid #dde1e8}
.gh-user{display:inline-flex;align-items:center;gap:3px;font-size:14px;font-weight:500;color:#3b3f4c;cursor:pointer;border:none;background:none;padding:0;line-height:1}
.gh-user:hover{color:#365eef}

/* ══════ 서브 네비게이션 ══════ */
.sub-nav{height:54px;background:#fff;border-bottom:1px solid #dde1e8;display:flex;align-items:flex-end;padding:0 24px;position:fixed;top:56px;left:0;right:0;z-index:205}
.sub-nav-item{position:relative;display:inline-flex;align-items:center;justify-content:center;height:54px;padding:0 16px;font-size:15px;font-weight:500;color:#6d7381;cursor:pointer;text-decoration:none;line-height:1;background:none;border:none;font-family:inherit}
.sub-nav-item:hover{color:#222631}
.sub-nav-item.active{color:#365eef;font-weight:600}
.sub-nav-item.active::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;background:#365eef;border-radius:2px 2px 0 0}

/* ══════ 사이드바 ══════ */
.sidebar{position:fixed;top:110px;left:0;bottom:0;width:56px;background:#fff;border-right:1px solid #dde1e8;display:flex;flex-direction:column;align-items:center;padding:8px 0;z-index:100;gap:4px}
.sb-item{width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;color:#6d7381;cursor:pointer;border:none;background:none}
.sb-item:hover{background:#f6f7f9;color:#3b3f4c}
.sb-item.active{background:#e9f2ff;color:#365eef}

/* ══════ 메인 ══════ */
.main{margin-left:56px;margin-top:110px;padding:24px 24px 100px;display:flex;justify-content:center}
.container{width:100%;max-width:1248px;display:flex;flex-direction:column;gap:18px}

/* ══════ 페이지 헤더 ══════ */
.page-header{display:flex;flex-direction:column;gap:8px}
.btn-back{display:inline-flex;align-items:center;gap:4px;font-size:15px;font-weight:500;color:#3b3f4c;background:none;border:none;cursor:pointer;padding:0;line-height:1;font-family:inherit;align-self:flex-start;margin-bottom:6px}
.btn-back:hover{color:#222631}
.page-title{font-size:22px;font-weight:700;color:#222631;line-height:1.3}
.page-desc{font-size:14px;color:#3b3f4c;line-height:1.55}

/* ══════ 카드 ══════ */
.card{background:#fff;border:1px solid #eaecf0;border-radius:14px;padding:24px;display:flex;flex-direction:column;gap:18px}
.card-hd{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-title{font-size:18px;font-weight:700;color:#222631;line-height:1.3}
.btn-detail-link{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:36px;padding:0 14px;border-radius:100px;background:#fff;border:1px solid #dde1e8;color:#3b3f4c;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;line-height:1}
.btn-detail-link:hover{border-color:#a3c3ff;color:#365eef}

/* ══════ 테이블 ══════ */
.score-table{width:100%;border-collapse:collapse;table-layout:fixed}
.score-table thead th{background:#f6f7f9;font-size:13px;font-weight:700;color:#3b3f4c;text-align:center;padding:12px 8px;height:44px;border-bottom:1px solid #dde1e8;line-height:1.3}
.score-table thead th:first-child{border-top-left-radius:8px}
.score-table thead th:last-child{border-top-right-radius:8px}
.score-table tbody td{padding:14px 8px;font-size:14px;color:#3b3f4c;line-height:1.4;text-align:center;border-bottom:1px solid #eaecf0;vertical-align:middle}
.score-table tbody tr:last-child td{border-bottom:none}
.score-table tbody tr:hover{background:#fafbff}

/* 컬럼 너비 */
.col-check{width:48px}
.col-id{width:90px}
.col-name{width:120px;text-align:left;padding-left:14px;font-weight:600;color:#222631}
.col-status{width:90px}
.col-total{width:90px;font-weight:700;color:#222631;font-size:15px}
.col-element{width:auto;color:#3b3f4c;font-size:14px;font-weight:600}
.col-max{font-size:12px;color:#9ca3af;font-weight:500;margin-left:2px}

/* 체크박스 */
.tbl-checkbox{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border:2px solid #dde1e8;border-radius:5px;background:#fff;color:#fff;cursor:pointer;transition:all .12s}
.tbl-checkbox.checked{background:#365eef;border-color:#365eef}
.tbl-checkbox:hover:not(.checked){border-color:#a3c3ff}

/* 상태 뱃지 */
.status-badge{display:inline-flex;align-items:center;justify-content:center;height:24px;padding:0 10px;border-radius:100px;font-size:12px;font-weight:700;line-height:1}
.status-badge.done{background:#dcfce7;color:#16a34a}
.status-badge.need{background:#fde7e9;color:#b91c1c}
.status-badge.progress{background:#fff3eb;color:#c2410c}
.status-badge.none{background:#f1f3f5;color:#6d7381}

/* 점수 셀 */
.score-cell{display:inline-flex;align-items:baseline;justify-content:center;gap:2px}
.score-cell .v{font-size:15px;font-weight:700;color:#222631}
.score-cell .sep{font-size:12px;color:#9ca3af;font-weight:500}
.score-cell .mx{font-size:12px;color:#6d7381;font-weight:500}

/* 점수 셀 dim (점수 0/없음 등) */
.score-cell.dim .v{color:#9ca3af;font-weight:500}

/* ══════ 푸터 액션 ══════ */
.footer-bar{position:fixed;bottom:0;left:56px;right:0;height:72px;background:#fff;border-top:1px solid #eaecf0;display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:120;box-shadow:0 -2px 8px rgba(0,0,0,.04)}
.footer-info{font-size:14px;color:#6d7381;line-height:1}
.footer-info strong{color:#365eef;font-weight:700}
.btn-confirm-bulk{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:48px;padding:0 24px;border-radius:100px;background:#dce6ff;border:none;color:#365eef;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1;transition:all .15s}
.btn-confirm-bulk:hover:not(:disabled){background:#365eef;color:#fff}
.btn-confirm-bulk:disabled{background:#f1f3f5;color:#9ca3af;cursor:not-allowed}

/* ══════ 모달 (AI 채점 근거·피드백 상세) ══════ */
.modal-overlay{position:fixed;inset:0;background:rgba(34,38,49,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:24px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;max-width:960px;width:100%;max-height:calc(100vh - 48px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.18)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid #eaecf0;flex-shrink:0}
.modal-title{font-size:18px;font-weight:700;color:#222631;line-height:1.3}
.modal-close{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;color:#6d7381;border-radius:100px}
.modal-close:hover{background:#f6f7f9}
.modal-body{padding:0;overflow-y:auto;flex:1}

.modal-table{width:100%;border-collapse:collapse;table-layout:fixed}
.modal-table thead th{background:#f6f7f9;font-size:13px;font-weight:700;color:#3b3f4c;text-align:center;padding:10px 8px;border-bottom:1px solid #dde1e8;line-height:1.3;position:sticky;top:0;z-index:2}
.modal-table tbody td{padding:14px 12px;font-size:13px;color:#3b3f4c;line-height:1.6;border-bottom:1px solid #f1f3f5;vertical-align:top}
.modal-table .col-id-m{width:80px;text-align:center;color:#6d7381}
.modal-table .col-name-m{width:90px;text-align:center;font-weight:600;color:#222631}
.modal-table .col-ground-m{width:auto}
.modal-table .col-feedback-m{width:auto}

/* 토스트 */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(12px);padding:14px 22px;border-radius:100px;font-size:15px;font-weight:500;line-height:1.4;box-shadow:0 4px 12px rgba(0,0,0,.15);opacity:0;transition:all .25s;z-index:900;pointer-events:none;display:flex;align-items:center;gap:10px;min-width:280px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:#319d64;color:#fff}

/* 반응형 */
@media (max-width:960px){
  .main{padding:18px 14px 100px}
  .page-title{font-size:20px}
  .card{padding:18px}
  .card-title{font-size:16px}
}
@media (max-width:720px){
  .global-header{height:52px;padding:0 12px 0 4px}
  .gh-product-tag{margin-left:8px;padding-left:8px;font-size:13px}
  .gh-plan,.gh-dday,.gh-credit,.gh-sep{display:none}
  .gh-user{font-size:13px}
  .sub-nav{top:52px;height:48px;padding:0 12px}
  .sub-nav-item{padding:0 10px;font-size:14px;height:48px}
  .sidebar{top:100px;width:48px}
  .sb-item{width:36px;height:36px}
  .main{margin-left:48px;margin-top:100px;padding:14px 10px 90px}
  .footer-bar{left:48px;padding:0 16px}
  .btn-confirm-bulk{font-size:14px;padding:0 16px;height:44px}
  .card{overflow-x:auto}
  .score-table{min-width:880px}
}
@media (max-width:420px){
  .sidebar{display:none}
  .main{margin-left:0;padding:12px 10px 90px}
  .footer-bar{left:0;padding:0 12px}
}
</style>
</head>
<body>

<!-- 글로벌 헤더 -->
<div class="global-header">
  <div class="gh-left">

    <a class="gh-logo" href="#" aria-label="CLIPO">

    <span class="gh-product-tag">초등</span>

  </div>
</div>

<!-- 서브 네비 -->
<nav class="sub-nav">
  <button class="sub-nav-item">수업 홈</button>
  <button class="sub-nav-item">수행평가 설계</button>
  <button class="sub-nav-item">과제물 관리</button>
  <button class="sub-nav-item active">수행평가 채점</button>
  <button class="sub-nav-item">세부능력 및 특기사항 지원</button>
</nav>

<!-- 사이드바 -->
<aside class="sidebar">
  <button class="sb-item" title="홈"><i data-lucide="home" style="width:20px;height:20px"></i></button>
  <button class="sb-item" title="평가계획"><i data-lucide="scissors" style="width:20px;height:20px"></i></button>
  <button class="sb-item active" title="수업"><i data-lucide="layout-grid" style="width:20px;height:20px"></i></button>
  <button class="sb-item" title="창의적 체험활동"><i data-lucide="notebook-pen" style="width:20px;height:20px"></i></button>
  <button class="sb-item" title="리포트"><i data-lucide="bar-chart-2" style="width:20px;height:20px"></i></button>
</aside>

<main class="main">
  <div class="container">

    <!-- 페이지 헤더 -->
    <div class="page-header">
      <button class="btn-back" onclick="history.back()">
        <i data-lucide="chevron-left" style="width:18px;height:18px"></i>이전으로
      </button>
      <h1 class="page-title">AI 점수 일괄 확정</h1>
      <p class="page-desc">선생님이 AI 점수와 채점 근거 및 피드백을 모두 확인하고 일괄 승인할 수 있습니다.</p>
    </div>

    <!-- 점수 표 카드 -->
    <section class="card">
      <div class="card-hd">

        <button class="btn-detail-link" onclick="openDetailModal()">
          <i data-lucide="eye" style="width:14px;height:14px"></i>AI 채점 근거 · 피드백 상세보기
        </button>
      </div>
      <div style="overflow-x:auto">
      <table class="score-table">
        <thead>
          <tr>
            <th class="col-check"><span class="tbl-checkbox" id="headerCheck" onclick="toggleAll(this)"><i data-lucide="check" style="width:13px;height:13px"></i></span></th>
            <th class="col-id">학번</th>
            <th class="col-name" style="text-align:left;padding-left:14px">이름</th>
            <th class="col-status">상태</th>

            <th class="col-element">고장에 대한<br>가치 인식·태도 <span class="col-max">/ 20</span></th>
          </tr>
        </thead>
        <tbody id="studentTbody"></tbody>
      </table>
      </div>
    </section>

  </div>
</main>

<!-- 푸터 액션 -->
<div class="footer-bar">
  <div class="footer-info"><strong id="selectedCount">10</strong>명 선택됨 · 선택한 학생들의 AI 점수를 확정 점수로 일괄 적용합니다.</div>
  <button class="btn-confirm-bulk" id="btnConfirm" onclick="confirmSelected()">
    <i data-lucide="stamp" style="width:18px;height:18px"></i>선택 학생 점수 확정하기
  </button>
</div>

<!-- 상세보기 모달 (AI 채점 근거·피드백) -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeDetailModal()">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title">AI 채점 근거 · 피드백 상세보기</span>
      <button class="modal-close" onclick="closeDetailModal()"><i data-lucide="x" style="width:18px;height:18px"></i></button>
    </div>
    <div class="modal-body">
      <table class="modal-table">
        <thead>
          <tr>
            <th class="col-id-m">학번</th>
            <th class="col-name-m">이름</th>
            <th class="col-ground-m">AI 채점 근거</th>
            <th class="col-feedback-m">AI 피드백</th>
          </tr>
        </thead>
        <tbody id="detailTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <i id="toastIcon" data-lucide="circle-check-big" style="width:18px;height:18px;flex-shrink:0"></i>
  <span id="toastMsg"></span>
</div>

<script>
// ══════ 학생 데이터 (목업) ══════
// 채점요소 3개: 장소 인식 및 특징 파악 능력(/10), 공간 구성 및 시각화 표현력(/20), 고장에 대한 가치 인식·태도(/20)
var STUDENTS = [

// 모든 학생 default 선택
STUDENTS.forEach(function(s){ s.checked = true; });

function totalOf(s){ return s.e1 + s.e2 + s.e3; }

function renderTable(){
  var tbody = document.getElementById('studentTbody');
  tbody.innerHTML = STUDENTS.map(function(s, idx){
    var checkClass = 'tbl-checkbox' + (s.checked ? ' checked' : '');
    return '<tr>'
      +'<td class="col-check"><span class="'+checkClass+'" onclick="toggleStudent('+idx+',this)"><i data-lucide="check" style="width:13px;height:13px"></i></span></td>'
      +'<td class="col-id">'+s.id+'</td>'
      +'<td class="col-name" style="text-align:left;padding-left:14px">'+s.name+'</td>'
      +'<td class="col-status"><span class="status-badge done">'+s.status+'</span></td>'
      +'<td class="col-total">'+totalOf(s).toFixed(1)+'</td>'
      +'<td><span class="score-cell"><span class="v">'+s.e1+'</span><span class="sep">/</span><span class="mx">10</span></span></td>'
      +'<td><span class="score-cell"><span class="v">'+s.e2+'</span><span class="sep">/</span><span class="mx">20</span></span></td>'
      +'<td><span class="score-cell"><span class="v">'+s.e3+'</span><span class="sep">/</span><span class="mx">20</span></span></td>'
      +'</tr>';
  }).join('');
  lucide.createIcons();
  updateSelectedCount();
}

function toggleStudent(i, el){
  STUDENTS[i].checked = !STUDENTS[i].checked;
  el.classList.toggle('checked');
  updateHeaderCheck();
  updateSelectedCount();
}
function toggleAll(el){
  var allChecked = STUDENTS.every(function(s){ return s.checked; });
  STUDENTS.forEach(function(s){ s.checked = !allChecked; });
  renderTable();
  document.getElementById('headerCheck').classList.toggle('checked', !allChecked);
}
function updateHeaderCheck(){
  var allChecked = STUDENTS.every(function(s){ return s.checked; });
  document.getElementById('headerCheck').classList.toggle('checked', allChecked);
}
function updateSelectedCount(){
  var n = STUDENTS.filter(function(s){ return s.checked; }).length;
  document.getElementById('selectedCount').textContent = n;
  var btn = document.getElementById('btnConfirm');
  btn.disabled = (n === 0);
}

function confirmSelected(){
  var n = STUDENTS.filter(function(s){ return s.checked; }).length;
  if(n === 0) return;
  showToast('success', n + '명의 AI 점수를 확정 점수로 적용했어요.');
  setTimeout(function(){ history.back(); }, 1500);
}

// 상세보기 모달
function openDetailModal(){
  var tbody = document.getElementById('detailTbody');
  tbody.innerHTML = STUDENTS.map(function(s){
    return '<tr>'
      +'<td class="col-id-m">'+s.id+'</td>'
      +'<td class="col-name-m">'+s.name+'</td>'
      +'<td class="col-ground-m">'+escHtml(s.ground)+'</td>'
      +'<td class="col-feedback-m">'+escHtml(s.feedback)+'</td>'
      +'</tr>';
  }).join('');
  document.getElementById('detailModal').classList.add('show');
}
function closeDetailModal(){ document.getElementById('detailModal').classList.remove('show'); }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ESC로 모달 닫기
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape' && document.getElementById('detailModal').classList.contains('show')){
    closeDetailModal();
  }
});

// 토스트
var toastTimer = null;
function showToast(type, msg){
  if(toastTimer) clearTimeout(toastTimer);
  var t = document.getElementById('toast');
  var ic = document.getElementById('toastIcon');
  var m = document.getElementById('toastMsg');
  t.className = 'toast ' + type + ' show';
  ic.setAttribute('data-lucide', 'circle-check-big');
  m.textContent = msg;
  lucide.createIcons();
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

renderTable();
lucide.createIcons();
</script>
