const STUDENTS=[
 {id:1,num:1,sid:'10101',name:'강민준',keywords:['리더십','발표 능력','봉사 정신'],
  aiHistory:['학급 자치회 체육대회에서 반장으로서 리더십을 발휘하여 반 학생들을 이끌었음. 경기 종목별 역할 배분과 연습 일정을 조율하는 과정에서 팀원들의 의견을 적극 수렴하고, 갈등 상황에서 중재자 역할을 자처하는 성숙한 태도를 보임. 발표 수업에서는 명확한 논리 전개와 자신감 있는 전달력으로 급우들의 이해를 도왔으며, 봉사 활동에서도 적극적인 참여 자세를 유지함.','리더십과 발표 능력, 봉사 정신이 두드러진 학생으로, 학급 내 다양한 역할을 자발적으로 수행함. 체육대회 준비 과정에서 반장으로서의 책임감과 조율 역량을 발휘하였으며, 발표 수업에서도 논리적 전달력이 돋보임.'],
  histCursor:0,teacherText:'학급 자치회 체육대회에서 반장으로서 리더십을 발휘하여 반 학생들을 이끌었음. 경기 종목별 역할 배분과 연습 일정을 조율하는 과정에서 팀원들의 의견을 적극 수렴하고, 갈등 상황에서 중재자 역할을 자처하는 성숙한 태도를 보임.',done:true,generating:false},
 {id:2,num:2,sid:'10102',name:'이서연',keywords:['수학과 진로 희망','발표 능력 우수','자기성찰'],
  aiHistory:['수학자를 꿈꾸는 명확한 진로 의식을 바탕으로 학업에 열중하며, 발표 수업에서 논리적이고 명쾌한 설명으로 급우들의 이해를 도왔음. 활동 소감문에서 자신의 학습 태도를 객관적으로 돌아보는 자기성찰적 서술이 두드러졌으며, 향후 꾸준한 성장이 기대됨.'],
  histCursor:0,teacherText:'',done:false,generating:false},
 {id:3,num:3,sid:'10103',name:'김태윤',keywords:['협동심','봉사'],
  aiHistory:['봉사 활동 및 학급 행사에 적극 참여하여 협동심을 발휘함. 어려움을 겪는 친구를 먼저 나서 도운 사례가 다수 관찰되었으며, 공동 과제 수행 시 팀 내 역할을 성실히 이행함.'],
  histCursor:0,teacherText:'봉사 활동 및 학급 행사에 적극 참여하여 협동심을 발휘함. 어려움을 겪는 친구를 먼저 나서 도운 사례가 다수 관찰되었으며, 공동 과제 수행 시 팀 내 역할을 성실히 이행함.',done:true,generating:false},
 {id:4,num:4,sid:'10104',name:'최수아',keywords:[],aiHistory:[],histCursor:0,teacherText:'',done:false,generating:false},
 {id:5,num:5,sid:'10105',name:'정도윤',keywords:[],aiHistory:[],histCursor:0,teacherText:'',done:false,generating:false},
 {id:6,num:6,sid:'10106',name:'한예린',keywords:[],aiHistory:[],histCursor:0,teacherText:'',done:false,generating:false},
 {id:7,num:7,sid:'10107',name:'오지훈',keywords:['자기주도 학습','창의적 문제 해결'],
  aiHistory:['자기주도적인 학습 태도와 창의적 문제 해결 능력이 돋보임. 주어진 과제 이상의 탐구를 자발적으로 수행하며, 독창적인 시각으로 문제에 접근하는 모습이 관찰됨.'],
  histCursor:0,teacherText:'자기주도적인 학습 태도와 창의적 문제 해결 능력이 돋보임. 주어진 과제 이상의 탐구를 자발적으로 수행하며, 독창적인 시각으로 문제에 접근하는 모습이 관찰됨.',done:true,generating:false},
];
let credits=700;
const autoSaveTimers={};
function render(){
 const tbody=document.getElementById('bulk-tbody');
 tbody.innerHTML='';
 STUDENTS.forEach(s=>{const tr=document.createElement('tr');if(s.done)tr.className='row-done';tr.innerHTML=buildRow(s);tbody.appendChild(tr);});
 lucide.createIcons();updateCounts();
 requestAnimationFrame(()=>document.querySelectorAll('.teacher-textarea').forEach(ta=>autoResize(ta)));
}
function buildRow(s){
 const numCell=`<td class="td-num">${s.sid}</td><td class="td-name">${s.name}</td>`;
 const kwTags=s.keywords.length?s.keywords.map(k=>`<span class="kw-tag">${k}</span>`).join(''):`<span class="kw-tag-none">입력된 키워드 없음</span>`;
 const kwCell=`<td><div class="kw-tags">${kwTags}</div><div class="kw-input-row"><input class="kw-input" id="kw-input-${s.id}" placeholder="특성 입력 후 Enter" onkeydown="onKwKey(event,${s.id})"><button class="kw-add-btn" onclick="addKw(${s.id})">추가</button></div>${s.aiHistory.length?`<button class="btn-regen" onclick="generateAI(${s.id})"><i data-lucide="refresh-cw" style="width:11px;height:11px"></i> 다시 생성</button>`:''}</td>`;
 let aiCell;
 if(s.generating){aiCell=`<td><div class="row-loading"><span class="mini-spinner"></span>AI가 기록을 생성하고 있어요...</div></td>`;}
 else if(s.aiHistory.length){
  const cur=s.aiHistory[s.histCursor],total=s.aiHistory.length,curNum=total-s.histCursor;
  aiCell=`<td><div class="ai-text-box">${cur}</div><div class="ai-footer"><span class="ai-byte">${cur.length}자 / ${countBytes(cur)}byte</span><div style="display:flex;align-items:center;gap:4px"><button class="hist-btn-sm" onclick="navHist(${s.id},-1)" ${s.histCursor===0?'disabled':''} title="이전 기록" style="position:relative"><i data-lucide="chevron-left" style="width:13px;height:13px"></i></button><button class="hist-btn-sm" onclick="navHist(${s.id},1)" ${s.histCursor===total-1?'disabled':''} title="다음 기록" style="position:relative"><i data-lucide="chevron-right" style="width:13px;height:13px"></i></button><button class="btn-copy-all" onclick="copyAI(${s.id})"><i data-lucide="copy" style="width:12px;height:12px"></i> 전체 복사</button></div></div>${total>1?`<div style="font-size:12px;color:#b3b6bd;margin-top:4px;text-align:right">버전 ${curNum} / ${total}</div>`:''}</td>`;
 }else{
  const hasKw=s.keywords.length>0;
  aiCell=`<td><div class="ai-empty"><p>${hasKw?'특성을 바탕으로 AI 기록을 생성해보세요.':'특성·키워드를 먼저 입력해주세요.'}</p><button class="btn-ai-gen" onclick="generateAI(${s.id})" ${!hasKw?'disabled':''}><i data-lucide="sparkles" style="width:14px;height:14px"></i> AI 기록 생성</button></div></td>`;
 }
 const hasAI=s.aiHistory.length>0&&!s.generating;
 const arrowCell=`<td class="td-arrow"><button class="btn-arrow" onclick="applyAI(${s.id})" ${!hasAI?'disabled':''} title="교사 기록란에 가져오기"><i data-lucide="arrow-right" style="width:15px;height:15px"></i></button></td>`;
 const teacherCell=`<td><textarea class="teacher-textarea" id="ta-${s.id}" oninput="scheduleAutoSave(${s.id})">${s.teacherText}</textarea><div class="teacher-footer"><span class="teacher-byte" id="byte-${s.id}">${s.teacherText.length}자 / ${countBytes(s.teacherText)}byte</span><span class="auto-save-st" id="ast-${s.id}" style="opacity:0">자동 저장됨</span></div>${s.done?`<div class="done-badge" style="margin-top:6px"><i data-lucide="check" style="width:10px;height:10px"></i> 저장됨</div>`:''}</td>`;
 return numCell+kwCell+aiCell+arrowCell+teacherCell;
}
function onKwKey(e,id){if(e.key==='Enter'){e.preventDefault();addKw(id);}}
function addKw(id){const input=document.getElementById('kw-input-'+id);const v=input.value.trim();if(!v)return;const s=STUDENTS.find(x=>x.id===id);if(!s.keywords.includes(v))s.keywords.push(v);input.value='';render();document.getElementById('kw-input-'+id)?.focus();}
function navHist(id,dir){const s=STUDENTS.find(x=>x.id===id);if(!s)return;s.histCursor=Math.max(0,Math.min(s.aiHistory.length-1,s.histCursor+dir));render();}
function generateAI(id){
 const s=STUDENTS.find(x=>x.id===id);if(!s||s.keywords.length===0)return;
 s.generating=true;render();credits=Math.max(0,credits-1);document.getElementById('credit-num').textContent=credits;
 setTimeout(()=>{const kw=s.keywords.slice(0,3).join(', ');s.aiHistory.unshift(`${s.name} 학생은 ${kw} 등의 역량을 자율활동 전반에서 두드러지게 발휘함. 구성원들과의 협력 과정에서 자신의 역할을 성실히 수행하였으며, 활동 소감문에서 자기성찰적 서술이 돋보임.`);s.histCursor=0;s.generating=false;render();showToast('AI 기록이 생성됐어요.');},1800);
}
function applyAI(id){const s=STUDENTS.find(x=>x.id===id);if(!s||!s.aiHistory.length)return;s.teacherText=s.aiHistory[s.histCursor];render();const ta=document.getElementById('ta-'+id);if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}showToast('AI 기록을 가져왔어요.');}
function batchApply(){let count=0;STUDENTS.forEach(s=>{if(s.aiHistory.length&&!s.done&&!s.teacherText){s.teacherText=s.aiHistory[s.histCursor];count++;}});render();showToast(count?`${count}명의 AI 기록을 가져왔어요.`:'가져올 기록이 없어요.');}
function copyAI(id){const s=STUDENTS.find(x=>x.id===id);if(!s||!s.aiHistory.length)return;navigator.clipboard?.writeText(s.aiHistory[s.histCursor]).catch(()=>{});showToast('복사됐어요.');}
function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
function scheduleAutoSave(id){
 clearTimeout(autoSaveTimers[id]);
 const ta=document.getElementById('ta-'+id),byteEl=document.getElementById('byte-'+id);
 if(ta){autoResize(ta);}
 if(ta&&byteEl){const n=countBytes(ta.value);byteEl.textContent=ta.value.length+'자 / '+n+'byte';byteEl.className='teacher-byte'+(n>1500?' over':'');}
 autoSaveTimers[id]=setTimeout(()=>{
  const s=STUDENTS.find(x=>x.id===id),ta2=document.getElementById('ta-'+id);
  if(!s||!ta2)return;s.teacherText=ta2.value;const wasDone=s.done;s.done=!!ta2.value.trim();
  const row=ta2.closest('tr');if(row)row.className=s.done?'row-done':'';
  if(s.done&&!wasDone){const el=document.createElement('div');el.className='done-badge';el.innerHTML='<i data-lucide="check" style="width:10px;height:10px"></i> 저장됨';ta2.parentNode.insertBefore(el,ta2);lucide.createIcons();}
  else if(!s.done&&wasDone){row?.querySelector('.done-badge')?.remove();}
  const astEl=document.getElementById('ast-'+id);if(astEl){astEl.style.opacity='1';setTimeout(()=>{if(astEl)astEl.style.opacity='0';},2500);}
  updateCounts();
 },1200);
}
function countBytes(str){let n=0;for(const ch of str)n+=ch.charCodeAt(0)>127?2:1;return n;}
function updateCounts(){const done=STUDENTS.filter(s=>s.done).length;document.getElementById('done-cnt').textContent=done;document.getElementById('done-msg').style.display=done===STUDENTS.length?'block':'none';}
function toggleNav(){document.getElementById('icon-sb').classList.toggle('expanded');document.body.classList.toggle('nav-expanded');}
function goList(){location.href='creative_activity_list_v4_260402.html';}
function goIndividual(){location.href='creative_activity_detail_v3_260402.html?type=자율활동';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function showInfo(title,msg){document.getElementById('info-title').textContent=title;document.getElementById('info-msg').textContent=msg;document.getElementById('info-overlay').classList.add('show');lucide.createIcons();}
function closeInfo(){document.getElementById('info-overlay').classList.remove('show');}
function initTextareaHeights(){document.querySelectorAll('.teacher-textarea').forEach(ta=>autoResize(ta));}
render();
initTextareaHeights();
</script>
</body>
</html>
