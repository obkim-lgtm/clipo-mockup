      { type:'changche',  label:'창체',     cls:'tag-t-changche',  title:'자율·자치활동 — 학급 자치', meta:'학생 31명 · 기록 31건', year:'2026학년도', date:'2026/05/28' },
      { type:'haengteuk', label:'행특',     cls:'tag-t-haengteuk', title:'행특 테스트 3', meta:'학생 2명 · 기록 2건', year:'2026학년도', date:'2026/06/05' },
      { type:'seteuk',    label:'간편세특', cls:'tag-t-seteuk',    title:'동아리 활동 세특', meta:'학생 12명 · 기록 12건', year:'2025학년도', date:'2025/11/20' },
      { type:'changche',  label:'창체',     cls:'tag-t-changche',  title:'진로활동 — 진로 탐색 주간', meta:'학생 31명 · 기록 31건', year:'2025학년도', date:'2025/10/30' },
      { type:'haengteuk', label:'행특',     cls:'tag-t-haengteuk', title:'1학년 2반 행동특성', meta:'학생 31명 · 기록 31건', year:'2025학년도', date:'2025/12/27' }
    ]
  },
  { name:'서천남중학교', exp:'11개월',
    classes:[
      { sem:'2025학년도 1학기', name:'사회', students:26, evals:3 },
      { sem:'2024학년도 2학기', name:'역사', students:24, evals:2 }
    ],
    records:[
      { type:'changche',  label:'창체', cls:'tag-t-changche',  title:'봉사활동 — 교내 도우미', meta:'학생 26명 · 기록 26건', year:'2025학년도', date:'2025/06/10' },
      { type:'haengteuk', label:'행특', cls:'tag-t-haengteuk', title:'2학년 3반 행동특성', meta:'학생 26명 · 기록 26건', year:'2024학년도', date:'2024/12/29' }
    ]
  }
];
var curIdx=0, curFilter='all';
function curSchool(){ return SCHOOLS[curIdx]; }

/* 학교 스위처 */
function renderSchoolMenu(){
  document.getElementById('sch-menu').innerHTML = SCHOOLS.map(function(s,i){
    return '<button class="sch-opt'+(i===curIdx?' sel':'')+'" onclick="selectSchool('+i+')"><i data-lucide="archive" style="width:15px;height:15px;color:#c2570c"></i>'+s.name+'<span class="so-exp">파기 '+s.exp+'</span></button>';
  }).join('');
  lucide.createIcons();
}
function toggleSchoolMenu(e){ if(e) e.stopPropagation(); document.getElementById('sch-menu').classList.toggle('open'); }
document.addEventListener('click', function(){ document.getElementById('sch-menu').classList.remove('open'); });
function selectSchool(i){
  curIdx=i; curFilter='all';
  var s=curSchool();
  document.getElementById('sch-name').textContent=s.name;
  document.getElementById('sch-exp').textContent=s.exp;
  document.getElementById('sch-menu').classList.remove('open');
  renderSchoolMenu(); renderClasses(); renderRecords();
}

/* 수업 카드 */
function classCard(c){
  return '<div class="cc" onclick="openRO(\''+c.name+'\')">'
    +'<div class="cc-top"><h3 class="cc-name">'+c.name+'</h3><i data-lucide="chevron-right" class="cc-go" style="width:18px;height:18px"></i></div>'
    +'<div class="cc-meta">수행평가 '+c.evals+'개 · 참여 학생 '+c.students+'명</div>'
    +'<div class="cc-tags"><span class="tag tag-prev"><i data-lucide="archive" style="width:12px;height:12px"></i>이전 소속</span><span class="tag tag-ro"><i data-lucide="eye" style="width:12px;height:12px"></i>읽기 전용</span></div>'
    +'</div>';
}
function renderClasses(){
  var list=curSchool().classes, order=[], map={};
  list.forEach(function(c){ if(!map[c.sem]){ map[c.sem]=[]; order.push(c.sem); } map[c.sem].push(c); });
  document.getElementById('class-list').innerHTML = order.map(function(sem){
    return '<div class="arc-sem"><div class="arc-sem-t">'+sem+' <span class="arc-sem-c">'+map[sem].length+'개</span></div><div class="grid">'+map[sem].map(classCard).join('')+'</div></div>';
  }).join('');
  document.getElementById('cnt-class').textContent=list.length;
  lucide.createIcons();
}

/* 기록 탭 */
function recCard(r){
  return '<div class="cc" data-type="'+r.type+'" onclick="openRO(\''+r.title+'\')">'
    +'<div class="cc-top"><h3 class="cc-name">'+r.title+'</h3><i data-lucide="chevron-right" class="cc-go" style="width:18px;height:18px"></i></div>'
    +'<div class="cc-meta">'+r.meta+'</div>'
    +'<div class="cc-date">'+r.date+' 생성</div>'
    +'<div class="cc-tags"><span class="tag '+r.cls+'">'+r.label+'</span><span class="tag tag-prev"><i data-lucide="archive" style="width:12px;height:12px"></i>이전 소속</span><span class="tag tag-ro"><i data-lucide="eye" style="width:12px;height:12px"></i>읽기 전용</span></div>'
    +'</div>';
}
function renderFilters(){
  var recs=curSchool().records;
  var types=[['all','전체'],['seteuk','간편세특'],['changche','창체'],['haengteuk','행특']];
  document.getElementById('rec-filters').innerHTML = types.map(function(t){
    var cnt = t[0]==='all' ? recs.length : recs.filter(function(r){ return r.type===t[0]; }).length;
    return '<button class="fchip'+(curFilter===t[0]?' on':'')+'" data-f="'+t[0]+'" onclick="setFilter(\''+t[0]+'\')">'+t[1]+' <span style="opacity:.7">'+cnt+'</span></button>';
  }).join('');
}
function renderRecords(){
  var recs=curSchool().records;
  document.getElementById('cnt-rec').textContent=recs.length;
  var order=[], map={};
  recs.forEach(function(r){ if(!map[r.year]){ map[r.year]=[]; order.push(r.year); } map[r.year].push(r); });
  document.getElementById('rec-list').innerHTML = order.map(function(y){
    return '<div class="arc-sem"><div class="arc-sem-t">'+y+' <span class="arc-sem-c">'+map[y].length+'개</span></div><div class="grid">'+map[y].map(recCard).join('')+'</div></div>';
  }).join('');
  renderFilters(); setFilter(curFilter);
  lucide.createIcons();
}
function setFilter(f){
  curFilter=f;
  document.querySelectorAll('#rec-filters .fchip').forEach(function(c){ c.classList.toggle('on', c.dataset.f===f); });
  document.querySelectorAll('#rec-list .arc-sem').forEach(function(group){
    var any=false;
    group.querySelectorAll('.cc').forEach(function(card){
      var show=(f==='all'||card.dataset.type===f);
      card.style.display=show?'flex':'none';
      if(show) any=true;
    });
    group.style.display=any?'block':'none';
  });
}

renderSchoolMenu();
renderClasses();
renderRecords();

lucide.createIcons();
</script>
