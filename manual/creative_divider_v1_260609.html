<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>창의적 체험활동 지원 · 챕터 간지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css">
<style>
*{font-family:'Pretendard GOV',sans-serif;box-sizing:border-box;margin:0;padding:0}
body{background:#cfd6e3;display:flex;justify-content:center;padding:40px 20px 80px}

/* A4 가로 간지 1장 */
.page{
  position:relative;
  width:1280px;height:905px;max-width:100%;
  background:#e8eefb;
  box-shadow:0 6px 30px rgba(0,0,0,.18);
  padding:150px 90px 0;
  overflow:hidden;
}

.chapter-label{font-size:17px;font-weight:800;color:#3b5bdb;letter-spacing:.5px;margin-bottom:4px}

.head{display:flex;align-items:baseline;gap:26px}
.head .no{font-size:104px;font-weight:800;color:#2f52c6;line-height:.95;letter-spacing:-2px}
.head .title{font-size:60px;font-weight:800;color:#1e2b5e;letter-spacing:-1.5px;display:flex;align-items:center;gap:14px}
.head .title .beta{font-size:18px;font-weight:700;color:#5965e0;background:#dfe3ff;padding:5px 13px;border-radius:13px;letter-spacing:0;align-self:center}

/* 구분선: 전체 얇은 연파랑 + 넘버 아래 진한 파랑 짧게 */
.divider{position:relative;height:4px;margin-top:18px}
.divider .thin{position:absolute;left:0;right:0;top:1px;height:2px;background:#c4d2f0}
.divider .accent{position:absolute;left:0;top:0;width:128px;height:4px;background:#3b5bdb;border-radius:2px}

.subtitle{font-size:27px;font-weight:600;color:#3b5bdb;margin-top:34px;letter-spacing:-.5px}

.toc{margin-top:54px;max-width:760px;display:flex;flex-direction:column;gap:24px}
.toc .row{display:flex;align-items:baseline;font-size:24px;color:#243160;font-weight:600;letter-spacing:-.4px}
.toc .row .nm{flex:1}
.toc .row .pg{width:90px;text-align:right;color:#2f52c6;font-variant-numeric:tabular-nums}
.toc .row .pg.tbd{color:#9fb0d8}
</style>
</head>
<body>

<div class="page">
  <div class="chapter-label">Chapter</div>

  <div class="head">
    <span class="no">10</span>
    <span class="title">창의적 체험활동 지원<span class="beta">Beta</span></span>
  </div>

  <div class="divider">
    <div class="thin"></div>
    <div class="accent"></div>
  </div>

  <div class="subtitle">활동지와 자기평가 설문을 활용하여 AI로 창체 기록 작성하기</div>

  <div class="toc">
    <div class="row"><span class="nm">10-1. 창의적 체험활동 화면 (활동 목록)</span><span class="pg tbd">·</span></div>
    <div class="row"><span class="nm">10-2. 활동 추가</span><span class="pg tbd">·</span></div>
    <div class="row"><span class="nm">10-3. 참여 학생 등록 (동아리)</span><span class="pg tbd">·</span></div>
    <div class="row"><span class="nm">10-4. 학생 자료 입력 (1단계)</span><span class="pg tbd">·</span></div>
    <div class="row"><span class="nm">10-5. AI 자료 분석 (2단계)</span><span class="pg tbd">·</span></div>
    <div class="row"><span class="nm">10-6. 기록 확인 및 수정 (3단계)</span><span class="pg tbd">·</span></div>
    <div class="row"><span class="nm">10-7. 자료 일괄 등록 (설문·PDF·활동 내역)</span><span class="pg tbd">·</span></div>
  </div>
</div>

</body>
</html>
